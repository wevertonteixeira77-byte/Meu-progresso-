<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Progresso</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

h1 {
  font-size: 26px;
  margin: 10px;
}

/* CALENDÁRIO */
#calendar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 15px;
}

.day {
  background: #222;
  padding: 25px;
  font-size: 18px;
  border-radius: 12px;
  cursor: pointer;
}

/* HISTÓRICO */
#historico {
  display: flex;
  gap: 10px;
  padding: 10px;
  overflow-x: auto;
}

.histItem {
  min-width: 100px;
  font-size: 12px;
}

/* TELAS */
#namesPage, #activityPage {
  display: none;
  padding: 15px;
}

/* NOMES */
.nameBox {
  background: #222;
  margin: 8px 0;
  padding: 12px;
  border-radius: 12px;
}

.nameTitle {
  font-size: 20px;
  font-weight: bold;
}

.nameResumo {
  font-size: 14px;
  color: #aaa;
}

/* ATIVIDADES */
#activities {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

#activities button {
  padding: 18px;
  font-size: 16px;
}

.selected {
  background: green;
}

/* BOTÕES */
button {
  font-size: 15px;
  padding: 10px;
  margin-top: 10px;
}

/* MÍDIA */
.media {
  max-width: 100%;
  margin-top: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>📅 Progresso</h1>

<div id="calendar"></div>

<!-- HISTÓRICO -->
<div id="historico"></div>

<div id="namesPage">
  <h2 id="dayTitle"></h2>
  <div id="namesList"></div>
  <button onclick="back()">Voltar</button>
</div>

<div id="activityPage">
  <h2 id="personTitle"></h2>

  <div id="activities">
    <button onclick="toggle(this)">Perna</button>
    <button onclick="toggle(this)">Braço</button>
    <button onclick="toggle(this)">Misto (Perna + Braço)</button>
    <button onclick="toggle(this)">Estudo</button>
  </div>

  <input type="file" id="fileInput">

  <button onclick="save()">Salvar</button>
  <button onclick="backToNames()">Voltar</button>

  <div id="preview"></div>
</div>

<script>
const people = ["Weverton", "Matheus", "Paulo"];

let currentDay = null;
let currentPerson = null;

const calendar = document.getElementById("calendar");

// HISTÓRICO (voltar do celular)
let pageStack = [];

function pushPage(page) {
  pageStack.push(page);
  history.pushState({page}, "");
}

window.onpopstate = function() {
  if (pageStack.length > 1) {
    pageStack.pop();
    let last = pageStack[pageStack.length - 1];
    showPage(last, false);
  }
};

// CALENDÁRIO
for (let i = 1; i <= 30; i++) {
  let div = document.createElement("div");
  div.className = "day";
  div.innerText = i;
  div.onclick = () => openDay(i);
  calendar.appendChild(div);
}

function showPage(page, addHistory = true) {
  calendar.style.display = "none";
  document.getElementById("namesPage").style.display = "none";
  document.getElementById("activityPage").style.display = "none";

  document.getElementById(page).style.display = "block";

  if (addHistory) pushPage(page);
}

function openDay(day) {
  currentDay = day;
  document.getElementById("dayTitle").innerText = "Dia " + day;
  loadNames();
  showPage("namesPage");
}

function loadNames() {
  const list = document.getElementById("namesList");
  list.innerHTML = "";

  people.forEach(p => {
    let box = document.createElement("div");
    box.className = "nameBox";

    let key = `day_${currentDay}_${p}`;
    let data = JSON.parse(localStorage.getItem(key));

    let resumo = data ? data.activities.join(", ") : "Nenhuma atividade";

    box.innerHTML = `
      <div class="nameTitle">${p}</div>
      <div class="nameResumo">${resumo}</div>
    `;

    box.onclick = () => openPerson(p);
    list.appendChild(box);
  });
}

function openPerson(p) {
  currentPerson = p;
  document.getElementById("personTitle").innerText = p + " - Dia " + currentDay;
  load();
  showPage("activityPage");
}

function toggle(btn) {
  btn.classList.toggle("selected");
}

function save() {
  const activities = [];
  document.querySelectorAll(".selected").forEach(b => {
    activities.push(b.innerText);
  });

  const file = document.getElementById("fileInput").files[0];
  const key = `day_${currentDay}_${currentPerson}`;

  if (file) {
    let reader = new FileReader();
    reader.onload = function () {
      localStorage.setItem(key, JSON.stringify({
        activities,
        media: reader.result
      }));
      alert("Salvo!");
      load();
      carregarHistorico();
    };
    reader.readAsDataURL(file);
  } else {
    localStorage.setItem(key, JSON.stringify({
      activities,
      media: null
    }));
    alert("Salvo!");
    load();
    carregarHistorico();
  }
}

function load() {
  const key = `day_${currentDay}_${currentPerson}`;
  const data = JSON.parse(localStorage.getItem(key));

  const preview = document.getElementById("preview");
  preview.innerHTML = "";

  if (data) {
    preview.innerHTML += `<p>${data.activities.join(", ")}</p>`;

    if (data.media) {
      if (data.media.includes("video")) {
        preview.innerHTML += `<video class="media" controls src="${data.media}"></video>`;
      } else {
        preview.innerHTML += `<img class="media" src="${data.media}">`;
      }
    }
  }
}

function carregarHistorico() {
  const container = document.getElementById("historico");
  container.innerHTML = "";

  const hoje = new Date().getDate();
  const diaAnterior = hoje - 1;

  if (diaAnterior < 1) return;

  people.forEach(p => {
    const key = `day_${diaAnterior}_${p}`;
    const data = JSON.parse(localStorage.getItem(key));

    if (data && data.media) {
      let div = document.createElement("div");
      div.className = "histItem";

      if (data.media.includes("video")) {
        div.innerHTML = `
          <video width="100%" src="${data.media}" muted autoplay loop></video>
          <div>${p}</div>
        `;
      } else {
        div.innerHTML = `
          <img src="${data.media}" width="100%">
          <div>${p}</div>
        `;
      }

      container.appendChild(div);
    }
  });
}

function back() {
  history.back();
}

function backToNames() {
  history.back();
}

// INÍCIO
pageStack = ["calendar"];
carregarHistorico();
</script>

</body>
</html>
