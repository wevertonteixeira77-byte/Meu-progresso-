<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Progresso</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

h1 {
  font-size: 24px;
}

/* CALENDÁRIO */
#calendar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 10px;
}

.day {
  background: #222;
  padding: 20px;
  font-size: 18px;
  border-radius: 10px;
  cursor: pointer;
}

/* HISTÓRICO */
#historico {
  display: flex;
  overflow: hidden;
  gap: 10px;
  padding: 10px;
}

.card {
  min-width: 100px;
  background: #222;
  border-radius: 10px;
  padding: 5px;
  text-align: center;
}

.card img, .card video {
  width: 100%;
  border-radius: 8px;
}

/* TELAS */
#namesPage, #activityPage {
  display: none;
  padding: 10px;
}

/* NOMES */
.nameBox {
  background: #222;
  margin: 8px 0;
  padding: 10px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
}

.nameTitle {
  font-size: 18px;
  font-weight: bold;
}

.nameResumo {
  font-size: 14px;
  color: #aaa;
}

/* ATIVIDADES */
#activities {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

#activities button {
  padding: 15px;
  font-size: 14px;
}

.selected {
  background: green;
}

button {
  margin-top: 10px;
  padding: 10px;
}

/* PREVIEW */
.media {
  max-width: 100%;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>📅 Progresso</h1>

<div id="calendar"></div>

<!-- HISTÓRICO -->
<div id="historico"></div>

<div id="namesPage">
  <h2 id="dayTitle"></h2>
  <div id="namesList"></div>
  <button onclick="back()">Voltar</button>
</div>

<div id="activityPage">
  <h2 id="personTitle"></h2>

  <div id="activities">
    <button onclick="toggle(this)">Perna</button>
    <button onclick="toggle(this)">Braço</button>
    <button onclick="toggle(this)">Misto</button>
    <button onclick="toggle(this)">Estudo</button>
  </div>

  <input type="file" id="fileInput">

  <button onclick="save()">Salvar</button>
  <button onclick="backToNames()">Voltar</button>

  <div id="preview"></div>
</div>

<script>
const people = ["Weverton", "Matheus", "Paulo"];
let currentDay = null;
let currentPerson = null;

const calendar = document.getElementById("calendar");

// CALENDÁRIO
for (let i = 1; i <= 30; i++) {
  let div = document.createElement("div");
  div.className = "day";
  div.innerText = i;
  div.onclick = () => openDay(i);
  calendar.appendChild(div);
}

// HISTÓRICO (DIA ANTERIOR)
function carregarHistorico() {
  const container = document.getElementById("historico");
  container.innerHTML = "";

  const hoje = new Date().getDate();
  const diaAnterior = hoje - 1;

  if (diaAnterior < 1) return;

  people.forEach(p => {
    const key = `day_${diaAnterior}_${p}`;
    const data = JSON.parse(localStorage.getItem(key));

    if (data && data.media) {
      let div = document.createElement("div");
      div.className = "card";

      if (data.media.includes("video")) {
        div.innerHTML = `
          <video src="${data.media}" autoplay muted loop></video>
          <small>${p}</small>
        `;
      } else {
        div.innerHTML = `
          <img src="${data.media}">
          <small>${p}</small>
        `;
      }

      container.appendChild(div);
    }
  });
}

// LOOP AUTOMÁTICO
let scrollPos = 0;
setInterval(() => {
  const container = document.getElementById("historico");
  scrollPos += 1;
  container.scrollLeft = scrollPos;
}, 50);

// NAVEGAÇÃO
let stack = ["calendar"];

window.onpopstate = () => {
  if (stack.length > 1) {
    stack.pop();
    show(stack[stack.length - 1], false);
  }
};

function show(id, push=true) {
  document.getElementById("calendar").style.display = "none";
  document.getElementById("namesPage").style.display = "none";
  document.getElementById("activityPage").style.display = "none";

  document.getElementById(id).style.display = "block";

  if (push) {
    stack.push(id);
    history.pushState({}, "");
  }
}

function openDay(day) {
  currentDay = day;
  document.getElementById("dayTitle").innerText = "Dia " + day;
  loadNames();
  show("namesPage");
}

function loadNames() {
  const list = document.getElementById("namesList");
  list.innerHTML = "";

  people.forEach(p => {
    let box = document.createElement("div");
    box.className = "nameBox";

    let key = `day_${currentDay}_${p}`;
    let data = JSON.parse(localStorage.getItem(key));

    let resumo = data ? data.activities.join(", ") : "—";

    box.innerHTML = `
      <div class="nameTitle">${p}</div>
      <div class="nameResumo">${resumo}</div>
    `;

    box.onclick = () => openPerson(p);
    list.appendChild(box);
  });
}

function openPerson(p) {
  currentPerson = p;
  document.getElementById("personTitle").innerText = p + " - Dia " + currentDay;
  load();
  show("activityPage");
}

function toggle(btn) {
  btn.classList.toggle("selected");
}

function save() {
  const activities = [];
  document.querySelectorAll(".selected").forEach(b => {
    activities.push(b.innerText);
  });

  const file = document.getElementById("fileInput").files[0];
  const key = `day_${currentDay}_${currentPerson}`;

  if (file) {
    let reader = new FileReader();
    reader.onload = function () {
      localStorage.setItem(key, JSON.stringify({
        activities,
        media: reader.result
      }));
      alert("Salvo!");
      load();
      carregarHistorico();
    };
    reader.readAsDataURL(file);
  } else {
    localStorage.setItem(key, JSON.stringify({
      activities,
      media: null
    }));
    alert("Salvo!");
    load();
    carregarHistorico();
  }
}

function load() {
  const key = `day_${currentDay}_${currentPerson}`;
  const data = JSON.parse(localStorage.getItem(key));

  const preview = document.getElementById("preview");
  preview.innerHTML = "";

  if (data) {
    preview.innerHTML += `<p>${data.activities.join(", ")}</p>`;
  }
}

function back() {
  history.back();
}

function backToNames() {
  history.back();
}

// INÍCIO
carregarHistorico();
</script>

</body>
</html>
