<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Progresso</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

h1 { font-size: 24px; }

/* PROGRESSO */
#progressBarContainer {
  width: 90%;
  height: 20px;
  background: #333;
  margin: 10px auto;
  border-radius: 10px;
  overflow: hidden;
}

#progressBar {
  height: 100%;
  width: 0%;
  background: green;
  transition: 0.3s;
}

/* CALENDÁRIO */
#calendar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 10px;
}

.day {
  background: #222;
  padding: 20px;
  border-radius: 10px;
  cursor: pointer;
}

/* TELAS */
.page {
  display: none;
}

/* NOMES */
.nameBox {
  background: #222;
  margin: 8px;
  padding: 10px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

/* ATIVIDADES */
#activities {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  padding: 10px;
}

#activities button {
  padding: 15px;
}

.selected {
  background: green;
}

button {
  margin: 10px;
  padding: 10px;
}
</style>
</head>

<body>

<h1>📅 Progresso</h1>

<!-- PROGRESSO -->
<div id="progressBarContainer">
  <div id="progressBar"></div>
</div>
<p id="progressText"></p>

<!-- RANKING -->
<h3>🏆 Ranking</h3>
<div id="ranking"></div>

<!-- CALENDÁRIO -->
<div id="calendar" class="page" style="display:block;"></div>

<!-- NOMES -->
<div id="namesPage" class="page">
  <h2 id="dayTitle"></h2>
  <div id="namesList"></div>
  <button onclick="goToCalendar()">Voltar</button>
</div>

<!-- ATIVIDADES -->
<div id="activityPage" class="page">
  <h2 id="personTitle"></h2>

  <div id="activities">
    <button onclick="toggle(this)">Perna</button>
    <button onclick="toggle(this)">Braço</button>
    <button onclick="toggle(this)">Estudo</button>
    <button onclick="toggle(this)">Alongamento</button>
  </div>

  <button onclick="save()">Salvar</button>
  <button onclick="goToNames()">Voltar</button>
</div>

<script>
const people = ["Weverton", "Matheus", "Paulo"];
let currentDay = null;
let currentPerson = null;

// CRIAR CALENDÁRIO
function criarCalendario() {
  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  for (let i = 1; i <= 30; i++) {
    let div = document.createElement("div");
    div.className = "day";
    div.innerText = i;
    div.onclick = () => openDay(i);
    calendar.appendChild(div);
  }
}

// MOSTRAR TELA
function showPage(id) {
  document.querySelectorAll(".page").forEach(p => p.style.display = "none");
  document.getElementById(id).style.display = "block";
}

// NAVEGAÇÃO
function goToCalendar() {
  showPage("calendar");
}

function goToNames() {
  showPage("namesPage");
}

// ABRIR DIA
function openDay(day) {
  currentDay = day;
  document.getElementById("dayTitle").innerText = "Dia " + day;
  loadNames();
  atualizarProgresso();
  showPage("namesPage");
}

// NOMES
function loadNames() {
  const list = document.getElementById("namesList");
  list.innerHTML = "";

  people.forEach(p => {
    let data = JSON.parse(localStorage.getItem(`day_${currentDay}_${p}`) || "null");

    let box = document.createElement("div");
    box.className = "nameBox";
    box.innerHTML = `
      <div>${p}</div>
      <div>${data ? data.activities.join(", ") : "—"}</div>
    `;

    box.onclick = () => openPerson(p);
    list.appendChild(box);
  });
}

// ABRIR PESSOA
function openPerson(p) {
  currentPerson = p;
  document.getElementById("personTitle").innerText = `${p} - Dia ${currentDay}`;
  load();
  showPage("activityPage");
}

// TOGGLE
function toggle(btn) {
  btn.classList.toggle("selected");
}

// SALVAR
function save() {
  const activities = [];

  document.querySelectorAll(".selected").forEach(b => {
    activities.push(b.innerText);
  });

  localStorage.setItem(
    `day_${currentDay}_${currentPerson}`,
    JSON.stringify({ activities })
  );

  alert("Salvo!");
  load();
  atualizarProgresso();
  atualizarRanking();
  atualizarCalendario();
}

// LOAD
function load() {
  const data = JSON.parse(localStorage.getItem(`day_${currentDay}_${currentPerson}`) || "null");

  document.querySelectorAll("#activities button").forEach(b => {
    b.classList.remove("selected");
  });

  if (!data) return;

  data.activities.forEach(a => {
    document.querySelectorAll("#activities button").forEach(b => {
      if (b.innerText === a) b.classList.add("selected");
    });
  });
}

// PROGRESSO
function atualizarProgresso() {
  let count = 0;

  people.forEach(p => {
    const data = JSON.parse(localStorage.getItem(`day_${currentDay}_${p}`) || "null");
    if (data && data.activities.length > 0) {
      count++;
    }
  });

  const percent = (count / people.length) * 100;

  document.getElementById("progressBar").style.width = percent + "%";
  document.getElementById("progressText").innerText =
    `${count}/${people.length} concluído`;
}

// CALENDÁRIO VERDE
function atualizarCalendario() {
  const dias = document.querySelectorAll(".day");

  dias.forEach((div, index) => {
    let dia = index + 1;
    let feito = false;

    people.forEach(p => {
      const data = JSON.parse(localStorage.getItem(`day_${dia}_${p}`) || "null");
      if (data && data.activities.length > 0) {
        feito = true;
      }
    });

    div.style.background = feito ? "green" : "#222";
  });
}

// RANKING
function atualizarRanking() {
  let resultado = [];

  people.forEach(p => {
    let total = 0;

    for (let d = 1; d <= 30; d++) {
      const data = JSON.parse(localStorage.getItem(`day_${d}_${p}`) || "null");
      if (data && data.activities.length > 0) {
        total++;
      }
    }

    resultado.push({ nome: p, total });
  });

  resultado.sort((a, b) => b.total - a.total);

  const div = document.getElementById("ranking");
  div.innerHTML = "";

  resultado.forEach((p, i) => {
    div.innerHTML += `<p>${i + 1}º - ${p.nome} (${p.total} dias)</p>`;
  });
}

// BLOQUEAR SAÍDA (corrige WhatsApp)
history.pushState(null, null, location.href);
window.onpopstate = function () {
  showPage("calendar");
};

// INÍCIO
criarCalendario();
atualizarCalendario();
atualizarRanking();
</script>

</body>
</html>
