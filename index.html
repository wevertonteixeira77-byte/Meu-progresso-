<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Progresso</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

h1 { font-size: 24px; }

/* CALENDÁRIO */
#calendar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 10px;
}

.day {
  background: #222;
  padding: 20px;
  font-size: 18px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.day:hover {
  transform: scale(1.05);
}

/* HISTÓRICO */
#historico {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 10px;
}

.card {
  min-width: 100px;
  background: #222;
  border-radius: 10px;
  padding: 5px;
}

.card img, .card video {
  width: 100%;
  border-radius: 8px;
}

/* TELAS */
#namesPage, #activityPage {
  display: none;
  padding: 10px;
}

/* NOMES */
.nameBox {
  background: #222;
  margin: 8px 0;
  padding: 10px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

/* ATIVIDADES */
#activities {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

#activities button {
  padding: 15px;
}

.selected {
  background: green;
}

button {
  margin-top: 10px;
  padding: 10px;
}

.media {
  max-width: 100%;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>📅 Progresso</h1>

<div id="calendar"></div>
<div id="historico"></div>

<div id="namesPage">
  <h2 id="dayTitle"></h2>
  <div id="namesList"></div>
  <button onclick="back()">Voltar</button>
</div>

<div id="activityPage">
  <h2 id="personTitle"></h2>

  <div id="activities">
    <button onclick="toggle(this)">Perna</button>
    <button onclick="toggle(this)">Braço</button>
    <button onclick="toggle(this)">Misto</button>
    <button onclick="toggle(this)">Estudo</button>
  </div>

  <input type="file" id="fileInput" accept="image/*,video/*">

  <button onclick="save()">Salvar</button>
  <button onclick="back()">Voltar</button>

  <div id="preview"></div>
</div>

<script>
const people = ["Weverton", "Matheus", "Paulo"];
let currentDay = null;
let currentPerson = null;

function getData(day, person) {
  return JSON.parse(localStorage.getItem(`day_${day}_${person}`) || "null");
}

function setData(day, person, data) {
  localStorage.setItem(`day_${day}_${person}`, JSON.stringify(data));
}

// CALENDÁRIO
const calendar = document.getElementById("calendar");

for (let i = 1; i <= 30; i++) {
  let div = document.createElement("div");
  div.className = "day";
  div.innerText = i;

  if (getData(i, people[0])) {
    div.style.background = "green";
  }

  div.onclick = () => openDay(i);
  calendar.appendChild(div);
}

// HISTÓRICO
function carregarHistorico() {
  const container = document.getElementById("historico");
  container.innerHTML = "";

  const hoje = new Date().getDate();
  const diaAnterior = hoje - 1;

  if (diaAnterior < 1) return;

  people.forEach(p => {
    const data = getData(diaAnterior, p);

    if (data && data.media) {
      let div = document.createElement("div");
      div.className = "card";

      if (data.type && data.type.startsWith("video")) {
        div.innerHTML = `<video src="${data.media}" autoplay muted loop></video><small>${p}</small>`;
      } else {
        div.innerHTML = `<img src="${data.media}"><small>${p}</small>`;
      }

      container.appendChild(div);
    }
  });
}

// NAVEGAÇÃO
let stack = ["calendar"];

function show(id) {
  ["calendar","namesPage","activityPage"].forEach(p => {
    document.getElementById(p).style.display = "none";
  });

  document.getElementById(id).style.display = "block";
  stack.push(id);
}

function back() {
  stack.pop();
  show(stack[stack.length - 1]);
}

// ABRIR DIA
function openDay(day) {
  currentDay = day;
  document.getElementById("dayTitle").innerText = "Dia " + day;
  loadNames();
  show("namesPage");
}

function loadNames() {
  const list = document.getElementById("namesList");
  list.innerHTML = "";

  people.forEach(p => {
    let data = getData(currentDay, p);

    let box = document.createElement("div");
    box.className = "nameBox";
    box.innerHTML = `
      <div>${p}</div>
      <div>${data ? data.activities.join(", ") : "—"}</div>
    `;

    box.onclick = () => openPerson(p);
    list.appendChild(box);
  });
}

// ABRIR PESSOA
function openPerson(p) {
  currentPerson = p;
  document.getElementById("personTitle").innerText = `${p} - Dia ${currentDay}`;
  load();
  show("activityPage");
}

// TOGGLE
function toggle(btn) {
  btn.classList.toggle("selected");
}

// SALVAR
function save() {
  const activities = [];
  document.querySelectorAll(".selected").forEach(b => {
    activities.push(b.innerText);
  });

  const file = document.getElementById("fileInput").files[0];

  const salvar = (media = null, type = null) => {
    setData(currentDay, currentPerson, { activities, media, type });
    alert("Salvo!");
    load();
    carregarHistorico();
  };

  if (file) {
    const reader = new FileReader();
    reader.onload = () => salvar(reader.result, file.type);
    reader.readAsDataURL(file);
  } else {
    salvar();
  }
}

// LOAD
function load() {
  const data = getData(currentDay, currentPerson);

  const preview = document.getElementById("preview");
  preview.innerHTML = "";

  document.querySelectorAll("#activities button").forEach(b => {
    b.classList.remove("selected");
  });

  if (!data) return;

  data.activities.forEach(a => {
    document.querySelectorAll("#activities button").forEach(b => {
      if (b.innerText === a) b.classList.add("selected");
    });
  });

  if (data.media) {
    if (data.type && data.type.startsWith("video")) {
      preview.innerHTML += `<video class="media" src="${data.media}" controls></video>`;
    } else {
      preview.innerHTML += `<img class="media" src="${data.media}">`;
    }
  }
}

// INÍCIO
carregarHistorico();
</script>

</body>
</html>
