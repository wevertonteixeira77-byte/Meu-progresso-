<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Progresso</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

h1 {
  font-size: 26px;
}

/* CALENDÁRIO */
#calendar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 15px;
}

.day {
  background: #222;
  padding: 25px;
  font-size: 18px;
  border-radius: 12px;
  cursor: pointer;
}

/* TELAS */
#namesPage, #activityPage {
  display: none;
  padding: 15px;
}

/* NOMES */
.nameBox {
  background: #222;
  margin: 10px 0;
  padding: 15px;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.nameTitle {
  font-size: 20px;
  font-weight: bold;
}

.nameResumo {
  font-size: 16px;
  color: #aaa;
}

/* ATIVIDADES */
#activities {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

#activities button {
  padding: 18px;
  font-size: 16px;
}

.selected {
  background: green;
}

/* BOTÕES */
button {
  font-size: 15px;
  padding: 10px;
  margin-top: 10px;
}

/* MÍDIA */
.media {
  max-width: 100%;
  margin-top: 15px;
}
</style>
</head>

<body>

<h1>📅 Progresso</h1>

<div id="calendar"></div>

<div id="namesPage">
  <h2 id="dayTitle"></h2>
  <div id="namesList"></div>
  <button onclick="back()">Voltar</button>
</div>

<div id="activityPage">
  <h2 id="personTitle"></h2>

  <div id="activities">
    <button onclick="toggle(this)">Perna</button>
    <button onclick="toggle(this)">Braço</button>
    <button onclick="toggle(this)">Misto</button>
    <button onclick="toggle(this)">Estudo</button>
  </div>

  <input type="file" id="fileInput">

  <button onclick="save()">Salvar</button>
  <button onclick="backToNames()">Voltar</button>

  <div id="preview"></div>
</div>

<script>
const people = ["Weverton", "Matheus", "Paulo"];

let currentDay = null;
let currentPerson = null;

const calendar = document.getElementById("calendar");

// HISTÓRICO PARA BOTÃO VOLTAR
let pageStack = [];

function pushPage(page) {
  pageStack.push(page);
  history.pushState({page}, "");
}

window.onpopstate = function() {
  if (pageStack.length > 1) {
    pageStack.pop();
    let last = pageStack[pageStack.length - 1];
    showPage(last, false);
  }
};

// calendário
for (let i = 1; i <= 30; i++) {
  let div = document.createElement("div");
  div.className = "day";
  div.innerText = i;
  div.onclick = () => openDay(i);
  calendar.appendChild(div);
}

function showPage(page, addHistory = true) {
  calendar.style.display = "none";
  document.getElementById("namesPage").style.display = "none";
  document.getElementById("activityPage").style.display = "none";

  document.getElementById(page).style.display = "block";

  if (addHistory) pushPage(page);
}

function openDay(day) {
  currentDay = day;
  document.getElementById("dayTitle").innerText = "Dia " + day;
  loadNames();
  showPage("namesPage");
}

function loadNames() {
  const list = document.getElementById("namesList");
  list.innerHTML = "";

  people.forEach(p => {
    let box = document.createElement("div");
    box.className = "nameBox";

    let key = `day_${currentDay}_${p}`;
    let data = JSON.parse(localStorage.getItem(key));

    let resumo = data ? data.activities.join(", ") : "—";

    box.innerHTML = `
      <div class="nameTitle">${p}</div>
      <div class="nameResumo">${resumo}</div>
    `;

    box.onclick = () => openPerson(p);
    list.appendChild(box);
  });
}

function openPerson(p) {
  currentPerson = p;
  document.getElementById("personTitle").innerText = p + " - Dia " + currentDay;
  load();
  showPage("activityPage");
}

function toggle(btn) {
  btn.classList.toggle("selected");
}

function save() {
  const activities = [];
  document.querySelectorAll(".selected").forEach(b => {
    activities.push(b.innerText);
  });

  const file = document.getElementById("fileInput").files[0];
  const key = `day_${currentDay}_${currentPerson}`;

  if (file) {
    let reader = new FileReader();
    reader.onload = function () {
      localStorage.setItem(key, JSON.stringify({
        activities,
        media: reader.result
      }));
      alert("Salvo!");
      load();
    };
    reader.readAsDataURL(file);
  } else {
    localStorage.setItem(key, JSON.stringify({
      activities,
      media: null
    }));
    alert("Salvo!");
    load();
  }
}

function load() {
  const key = `day_${currentDay}_${currentPerson}`;
  const data = JSON.parse(localStorage.getItem(key));

  const preview = document.getElementById("preview");
  preview.innerHTML = "";

  if (data) {
    preview.innerHTML += `<p>${data.activities.join(", ")}</p>`;
  }
}

function back() {
  history.back();
}

function backToNames() {
  history.back();
}

// INÍCIO
pageStack = ["calendar"];
</script>

</body>
</html>
