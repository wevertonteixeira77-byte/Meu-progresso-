<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Progresso</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

h1 { font-size: 24px; }

/* PROGRESSO */
#progressBarContainer {
  width: 90%;
  height: 20px;
  background: #333;
  margin: 10px auto;
  border-radius: 10px;
  overflow: hidden;
}

#progressBar {
  height: 100%;
  width: 0%;
  background: green;
  transition: 0.3s;
}

/* CALENDÁRIO */
#calendar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 10px;
}

.day {
  background: #222;
  padding: 20px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.day:hover {
  transform: scale(1.05);
}

/* TELAS */
#namesPage, #activityPage {
  display: none;
  padding: 10px;
}

/* NOMES */
.nameBox {
  background: #222;
  margin: 8px 0;
  padding: 10px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

/* ATIVIDADES */
#activities {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

#activities button {
  padding: 15px;
}

.selected {
  background: green;
}

button {
  margin-top: 10px;
  padding: 10px;
}
</style>
</head>

<body>

<h1>📅 Progresso</h1>

<!-- BARRA -->
<div id="progressBarContainer">
  <div id="progressBar"></div>
</div>
<p id="progressText"></p>

<div id="calendar"></div>

<div id="namesPage">
  <h2 id="dayTitle"></h2>
  <div id="namesList"></div>
  <button onclick="show('calendar')">Voltar</button>
</div>

<div id="activityPage">
  <h2 id="personTitle"></h2>

  <div id="activities">
    <button onclick="toggle(this)">Perna</button>
    <button onclick="toggle(this)">Braço</button>
    <button onclick="toggle(this)">Estudo</button>
    <button onclick="toggle(this)">Alongamento</button>
  </div>

  <button onclick="save()">Salvar</button>
  <button onclick="show('namesPage')">Voltar</button>
</div>

<script>
const people = ["Weverton", "Matheus", "Paulo"];
let currentDay = null;
let currentPerson = null;

// CALENDÁRIO
const calendar = document.getElementById("calendar");

for (let i = 1; i <= 30; i++) {
  let div = document.createElement("div");
  div.className = "day";
  div.innerText = i;
  div.onclick = () => openDay(i);
  calendar.appendChild(div);
}

// NAVEGAÇÃO SIMPLES
function show(id) {
  document.getElementById("calendar").style.display = "none";
  document.getElementById("namesPage").style.display = "none";
  document.getElementById("activityPage").style.display = "none";

  document.getElementById(id).style.display = "block";
}

// ABRIR DIA
function openDay(day) {
  currentDay = day;
  document.getElementById("dayTitle").innerText = "Dia " + day;
  loadNames();
  atualizarProgresso();
  show("namesPage");
}

// LISTA DE NOMES
function loadNames() {
  const list = document.getElementById("namesList");
  list.innerHTML = "";

  people.forEach(p => {
    let data = JSON.parse(localStorage.getItem(`day_${currentDay}_${p}`) || "null");

    let box = document.createElement("div");
    box.className = "nameBox";
    box.innerHTML = `
      <div>${p}</div>
      <div>${data ? data.activities.join(", ") : "—"}</div>
    `;

    box.onclick = () => openPerson(p);
    list.appendChild(box);
  });
}

// ABRIR PESSOA
function openPerson(p) {
  currentPerson = p;
  document.getElementById("personTitle").innerText = `${p} - Dia ${currentDay}`;
  load();
  show("activityPage");
}

// TOGGLE
function toggle(btn) {
  btn.classList.toggle("selected");
}

// SALVAR
function save() {
  const activities = [];

  document.querySelectorAll(".selected").forEach(b => {
    activities.push(b.innerText);
  });

  localStorage.setItem(
    `day_${currentDay}_${currentPerson}`,
    JSON.stringify({ activities })
  );

  alert("Salvo!");
  load();
  atualizarProgresso();
}

// LOAD
function load() {
  const data = JSON.parse(localStorage.getItem(`day_${currentDay}_${currentPerson}`) || "null");

  document.querySelectorAll("#activities button").forEach(b => {
    b.classList.remove("selected");
  });

  if (!data) return;

  data.activities.forEach(a => {
    document.querySelectorAll("#activities button").forEach(b => {
      if (b.innerText === a) b.classList.add("selected");
    });
  });
}

// PROGRESSO
function atualizarProgresso() {
  let count = 0;

  people.forEach(p => {
    const data = JSON.parse(localStorage.getItem(`day_${currentDay}_${p}`) || "null");
    if (data && data.activities.length > 0) {
      count++;
    }
  });

  const percent = (count / people.length) * 100;

  document.getElementById("progressBar").style.width = percent + "%";
  document.getElementById("progressText").innerText =
    `${count}/${people.length} concluído`;
}
</script>

</body>
</html>
